version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: agriconnection-db
    environment:
      POSTGRES_USER: agriconnection
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: agriconnection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriconnection"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agriconnection

  # Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agriconnection-web
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://agriconnection:${DB_PASSWORD:-dev_password}@postgres:5432/agriconnection
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      MPESA_PASSKEY: ${MPESA_PASSKEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
    networks:
      - agriconnection
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  agriconnection:
    driver: bridge
